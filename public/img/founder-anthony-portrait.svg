<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800" role="img" aria-label="Anthony Malartre, founder Volia (photo officielle à venir, format portrait)">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.18" />
    </filter>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <circle cx="300" cy="370" r="180" fill="url(#ring)"/>
  <circle cx="300" cy="370" r="150" fill="rgba(255,255,255,0.08)"/>
  <text x="300" y="432" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif" font-size="196" font-weight="700" fill="#ffffff" filter="url(#shadow)">A</text>
  <text x="300" y="630" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.85)">Anthony Malartre</text>
  <text x="300" y="665" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.65)">Founder, Volia</text>
  <text x="300" y="730" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.45)" letter-spacing="3">PHOTO OFFICIELLE À VENIR</text>
</svg>
